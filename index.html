<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to my websites</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-neon: #39ff14;
      --green-pale: #7fff7f;
      --green-vivid: #00ff44;
      --bg: #000000;
      --glow-soft: 0 0 8px #39ff1466, 0 0 20px #39ff1433;
      --glow-strong: 0 0 12px #00ff44cc, 0 0 30px #00ff4466, 0 0 60px #00ff4422;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green-pale);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    /* Scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 255, 68, 0.015) 2px,
        rgba(0, 255, 68, 0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(57, 255, 20, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 20, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
    }

    /* ── TITLE ── */
    .title-wrap {
      text-align: center;
      animation: fadeInDown 1s ease both;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      color: var(--green-neon);
      text-shadow:
        0 0 10px var(--green-neon),
        0 0 25px var(--green-neon),
        0 0 60px #39ff1488,
        0 0 100px #39ff1433;
      letter-spacing: 0.08em;
      line-height: 1.15;
      animation: flicker 6s infinite;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 0.85rem;
      color: rgba(127, 255, 127, 0.4);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      animation: fadeInUp 1s ease 0.3s both;
    }

    .tab {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      background: transparent;
      border: 1px solid var(--green-pale);
      color: var(--green-pale);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.25s cubic-bezier(.34,1.56,.64,1),
        color 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
      overflow: hidden;
    }

    /* Corner accents */
    .tab::before,
    .tab::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: var(--green-vivid);
      border-style: solid;
      transition: opacity 0.2s;
      opacity: 0;
    }
    .tab::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .tab::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    .tab:hover {
      transform: scale(1.13);
      color: var(--green-vivid);
      border-color: var(--green-vivid);
      background: rgba(0, 255, 68, 0.07);
      box-shadow:
        0 0 14px rgba(0, 255, 68, 0.5),
        0 0 35px rgba(0, 255, 68, 0.2),
        inset 0 0 12px rgba(0, 255, 68, 0.06);
      text-shadow: 0 0 8px var(--green-vivid), 0 0 20px var(--green-vivid);
    }

    .tab:hover::before,
    .tab:hover::after {
      opacity: 1;
    }

    /* Ripple on click */
    .tab:active {
      transform: scale(1.06);
    }

    /* Icon SVGs */
    .tab svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
      transition: filter 0.2s;
    }

    .tab:hover svg {
      filter: drop-shadow(0 0 4px var(--green-vivid));
    }

    /* Staggered entry animations */
    .tab:nth-child(1) { animation: fadeInUp 0.6s ease 0.4s both; }
    .tab:nth-child(2) { animation: fadeInUp 0.6s ease 0.55s both; }
    .tab:nth-child(3) { animation: fadeInUp 0.6s ease 0.7s both; }
    .tab:nth-child(4) { animation: fadeInUp 0.6s ease 0.85s both; }

    /* ── KEYFRAMES ── */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes flicker {
      0%, 92%, 95%, 98%, 100% { opacity: 1; }
      93%                      { opacity: 0.85; }
      96%                      { opacity: 0.6; }
      99%                      { opacity: 0.9; }
    }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 16px;
      font-size: 0.65rem;
      color: rgba(127,255,127,0.2);
      letter-spacing: 0.25em;
      z-index: 10;
    }
  </style>
</head>
<body>
